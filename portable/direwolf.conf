# Portable Dire Wolf config — macOS + AIOC + HT on 145.050 MHz
#
# start.sh patches ADEVICE and PTT with detected AIOC values at
# launch.  Do not run direwolf against this file directly — use
# start.sh instead.

ADEVICE "__AIOC_AUDIO__:__AIOC_IN__" "__AIOC_AUDIO__:__AIOC_OUT__"
ARATE 48000

CHANNEL 0
MODEM 1200
MYCALL W9CPZ

PTT __AIOC_SERIAL__ DTR -RTS

AGWPORT 8000
KISSPORT 8001
