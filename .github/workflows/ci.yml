name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ansible-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible
    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "ansible/uv.lock"

      - name: Bootstrap (uv sync + galaxy install)
        run: make bootstrap

      - name: Lint + test
        run: make check
