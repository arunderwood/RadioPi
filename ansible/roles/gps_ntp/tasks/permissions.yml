---
- name: Deploy udev rule for /dev/pps0
  ansible.builtin.template:
    src: 99-pps-chrony.rules.j2
    dest: /etc/udev/rules.d/99-pps-chrony.rules
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload udev
    - Trigger udev for pps

- name: Ensure gpsd systemd drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/gpsd.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy gpsd SHM permissions drop-in
  ansible.builtin.template:
    src: gpsd-shm-permissions.conf.j2
    dest: /etc/systemd/system/gpsd.service.d/shm-permissions.conf
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart gpsd

- name: Ensure chrony systemd drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/chrony.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy chrony after-gpsd drop-in
  ansible.builtin.template:
    src: chrony-after-gpsd.conf.j2
    dest: /etc/systemd/system/chrony.service.d/after-gpsd.conf
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart chrony
