---
- name: Gather minimal facts
  ansible.builtin.setup:
    gather_subset:
      - min
      - distribution

- name: Set default boot target to console (no desktop)
  ansible.builtin.file:
    src: /lib/systemd/system/multi-user.target
    dest: /etc/systemd/system/default.target
    state: link
    force: true

- name: Update apt cache and dist-upgrade
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
    upgrade: dist
  become: true
  when: ansible_facts.os_family == 'Debian'

- name: Autoremove unused packages
  ansible.builtin.apt:
    autoremove: true
  become: true
  when: ansible_facts.os_family == 'Debian'

- name: Check for reboot-required flag
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: common_reboot_required_file
  changed_when: false
  when: ansible_facts.os_family == 'Debian'

- name: Warn if a reboot is required
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }} requires a reboot to complete package updates."
  when:
    - ansible_facts.os_family == 'Debian'
    - common_reboot_required_file.stat.exists | default(false)
